<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- apply theme before paint to avoid a flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('gh-theme')
          document.documentElement.dataset.theme =
            (t ? t === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
    <meta name="description" content="Gabriel Harlan — web & UX designer and Informatics student at Indiana University. Human-centered design, above ground and below it." />

    <!-- Open Graph / social cards -->
    <meta property="og:title" content="Gabriel Harlan" />
    <meta property="og:description" content="Web & UX designer. Human-centered design, above ground and below it." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gabrielharlan.is-a.dev" />
    <meta property="og:image" content="https://gabrielharlan.is-a.dev/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <link rel="canonical" href="https://gabrielharlan.is-a.dev" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gabriel Harlan — Web & UX Designer" />
    <meta name="twitter:description" content="Human-centered design, above ground and below it." />
    <meta name="twitter:image" content="https://gabrielharlan.is-a.dev/og.png" />

    <meta name="author" content="Gabriel Harlan" />
    <meta name="theme-color" content="#f4ecd8" />

    <!-- structured data for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Gabriel Harlan",
        "jobTitle": "Web & UX Designer",
        "url": "https://gabrielharlan.is-a.dev",
        "alumniOf": { "@type": "CollegeOrUniversity", "name": "Indiana University" },
        "knowsAbout": ["Web Design", "UX Design", "Human-Centered Computing", "Accessibility", "React"],
        "sameAs": ["https://github.com/gabeusgong", "https://linkedin.com/in/gbharlan"]
      }
    </script>

    <!-- Fonts: Fraunces (display), Schibsted Grotesk (body), Space Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <title>Gabriel Harlan — Web &amp; UX Designer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- privacy-friendly analytics (no cookies). Register the "gabrielharlan"
         subdomain (free) at goatcounter.com to activate. -->
    <script
      data-goatcounter="https://gabrielharlan.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </body>
</html>
